<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度 16 型人格测评（毒舌审判版）</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger-color: #ef4444;
            --hover-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        #app {
            background: var(--card-bg);
            width: 90%;
            max-width: 650px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 进度条 */
        .progress-container { margin-bottom: 30px; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.3s ease; }
        .dim-info { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); }

        /* 题目区 */
        .question-card { display: none; animation: slideIn 0.3s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-text { font-size: 1.25rem; font-weight: bold; margin-bottom: 25px; line-height: 1.6; }

        /* 选项按钮 */
        .options-group { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            text-align: left;
            font-size: 1rem;
            color: var(--text-main);
            line-height: 1.5;
        }
        .option-btn:hover { border-color: var(--primary-color); background: var(--hover-bg); transform: translateX(5px); }

        /* 结果页 */
        #result-page { display: none; text-align: center; animation: slideIn 0.6s ease; }
        .result-code { font-size: 3rem; font-weight: 900; letter-spacing: 2px; margin: 10px 0; color: var(--primary-color); }
        .result-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        
        /* 毒舌红字预警 */
        .is-idiot .result-code { color: var(--danger-color); }
        .is-idiot .result-title { color: var(--danger-color); }
        .is-idiot #res-desc { color: #7f1d1d; background: #fef2f2; padding: 20px; border-left: 5px solid var(--danger-color); border-radius: 8px; font-weight: 500; }
        
        #res-desc { text-align: justify; line-height: 1.8; margin-bottom: 25px; padding: 15px; background: #f8fafc; border-radius: 8px; }

        /* 深度分析卡片排版 (增量新增) */
        .deep-analysis-container { text-align: left; margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .analysis-box { padding: 18px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .analysis-box h4 { margin: 0 0 10px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .analysis-box p { margin: 0; line-height: 1.6; font-size: 0.95rem; text-align: justify; }

        .box-root { background: #fff7ed; border-left: 5px solid #f97316; color: #9a3412; }
        .box-root h4 { color: #c2410c; }

        .box-change { background: #f0fdf4; border-left: 5px solid #22c55e; color: #166534; }
        .box-change h4 { color: #15803d; }

        .box-fatal { background: #fef2f2; border-left: 5px solid #ef4444; color: #991b1b; }
        .box-fatal h4 { color: #b91c1c; }

        /* 对立维度双向条 */
        .dimension-chart { margin: 30px 0; }
        .vs-row { margin-bottom: 20px; text-align: left; }
        .vs-labels { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; }
        .vs-bar-bg { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: #e2e8f0; }
        .vs-bar-left { height: 100%; background: var(--primary-color); transition: width 1s ease; }
        .vs-bar-right { height: 100%; background: #94a3b8; transition: width 1s ease; }
        .is-idiot .vs-bar-left { background: var(--danger-color); }

        .btn-restart { width: 100%; border: none; background: var(--primary-color); color: white; padding: 16px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-restart:hover { background: #334155; }
        .is-idiot .btn-restart { background: var(--danger-color); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <!-- UI 进度条 -->
    <div class="progress-container" id="ui-progress">
        <div class="dim-info">
            <span id="step-counter">审判进度：1 / 32</span>
            <span id="percent-text">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <!-- 题目容器 -->
    <div id="question-container"></div>

    <!-- 结果页 -->
    <div id="result-page">
        <div class="result-code" id="res-code">????</div>
        <div class="result-title" id="res-title">正在生成你的精神画像...</div>
        <div id="res-desc"></div>
        
        <!-- 增量：深度分析容器 -->
        <div class="deep-analysis-container" id="deep-analysis-area">
            <div class="analysis-box box-root">
                <h4>🩸 核心病根</h4>
                <p id="res-root-cause"></p>
            </div>
            <div class="analysis-box box-change">
                <h4>🛠️ 破局自救指南</h4>
                <p id="res-how-to-change"></p>
            </div>
            <div class="analysis-box box-fatal">
                <h4>💀 不改变的致命下场</h4>
                <p id="res-fatal-outcome"></p>
            </div>
        </div>

        <div class="dimension-chart" id="dimension-viz">
            <!-- 动态生成对立维度条 -->
        </div>

        <button class="btn-restart" onclick="location.reload()">重新接受审判</button>
    </div>
</div>

<script>
/**
 * 16型人格维度配置（正负对立映射）
 * E(外向) vs I(内向) / S(实感) vs N(直觉) / T(理智) vs F(情感) / J(判断) vs P(感知)
 */
const config = {
    questions:[
        // --- E vs I (社交与能量来源) ---
        { text: "1. 经过一周高强度的工作后，周末你更倾向于如何恢复精力？", options:[ { text: "绝对要出去嗨，参加派对或见一堆朋友才觉得活过来", mapping: { E: 10 } }, { text: "约一两个好朋友喝杯咖啡，聊聊天", mapping: { E: 5, I: 2 } }, { text: "在家看看剧打打游戏，尽量少出门", mapping: { I: 5, E: 2 } }, { text: "关掉手机，绝对独处，任何人找我都会觉得烦躁", mapping: { I: 10 } } ] },
        { text: "2. 在一个全是陌生人的大型聚会上，你通常的状态是？", options:[ { text: "游刃有余，迅速成为人群焦点并主动搭讪", mapping: { E: 10 } }, { text: "会主动寻找看起来友善的人简单交流", mapping: { E: 6 } }, { text: "找个角落待着，只和主动来找我的人说话", mapping: { I: 6 } }, { text: "如同坐牢，满脑子都在算计什么时候能找借口溜走", mapping: { I: 10 } } ] },
        { text: "3. 遇到开心的事情时，你的第一反应是？", options:[ { text: "立刻发朋友圈，并打电话给所有人分享", mapping: { E: 10 } }, { text: "分享给几个最亲近的人", mapping: { E: 5 } }, { text: "在心里高兴，偶尔向伴侣提一句", mapping: { I: 5 } }, { text: "独自享受这份喜悦，觉得没必要告诉任何人", mapping: { I: 10 } } ] },
        { text: "4. 你说话的方式通常是？", options:[ { text: "想到什么说什么，边说边理清思路", mapping: { E: 10 } }, { text: "语速较快，喜欢表达自己的见解", mapping: { E: 5 } }, { text: "要在脑子里打好草稿才会开口", mapping: { I: 5 } }, { text: "极度沉默，能打字绝不发语音，能发语音绝不见面", mapping: { I: 10 } } ] },
        { text: "5. 当你需要思考一个复杂问题时？", options:[ { text: "必须找人头脑风暴，碰撞出火花", mapping: { E: 10 } }, { text: "一边散步一边自言自语", mapping: { E: 5 } }, { text: "在安静的环境中写写画画", mapping: { I: 5 } }, { text: "把自己关在绝对隔音的黑屋子里深度冥想", mapping: { I: 10 } } ] },
        { text: "6. 你的交友观是怎样的？", options:[ { text: "朋友遍天下，认识的人极多", mapping: { E: 10 } }, { text: "喜欢结交新朋友，圈子比较广", mapping: { E: 5 } }, { text: "只有三五个知心好友，很难接纳新人", mapping: { I: 5 } }, { text: "几乎没有朋友，觉得人类这种生物很麻烦", mapping: { I: 10 } } ] },
        { text: "7. 在办公室/班级里，你通常扮演？", options:[ { text: "气氛活跃者，随时随地在讲段子", mapping: { E: 10 } }, { text: "合群的人，别人聊天也会积极附和", mapping: { E: 5 } }, { text: "边缘人，默默做自己的事情", mapping: { I: 5 } }, { text: "透明人，恨不得带上隐身斗篷让所有人忽略我", mapping: { I: 10 } } ] },
        { text: "8. 对于“寂寞”你的感受是？", options:[ { text: "极其恐惧，一刻也不能忍受没人陪", mapping: { E: 10 } }, { text: "偶尔觉得空虚，想找人说话", mapping: { E: 5 } }, { text: "大部分时间很享受，偶尔觉得孤独", mapping: { I: 5 } }, { text: "寂寞？那是我最高级的享受，人类才是噪音", mapping: { I: 10 } } ] },

        // --- S vs N (获取信息：实感与直觉) ---
        { text: "9. 当你看一部科幻或奇幻电影时，你更关注什么？", options:[ { text: "特效真不真实，逻辑和物理定律有没有硬伤", mapping: { S: 10 } }, { text: "故事情节的发展和人物关系", mapping: { S: 5 } }, { text: "电影背后的隐喻和导演想表达的哲学思想", mapping: { N: 5 } }, { text: "完全沉浸在那个架空的宏大世界观和概念中", mapping: { N: 10 } } ] },
        { text: "10. 如果要拼装一个复杂的宜家柜子，你会？", options:[ { text: "严格按照说明书，一步一步核对螺丝型号", mapping: { S: 10 } }, { text: "大概看一眼说明书，然后开始动手", mapping: { S: 5 } }, { text: "觉得说明书很烦，凭直觉直接拼", mapping: { N: 5 } }, { text: "看一眼成品图，脑海里推演一遍结构，然后盲拼", mapping: { N: 10 } } ] },
        { text: "11. 别人向你描述一件事情时，你最讨厌什么？", options:[ { text: "没有时间地点人物，只说一些虚无缥缈的感受", mapping: { S: 10 } }, { text: "夸大其词，不符合实际情况", mapping: { S: 5 } }, { text: "过于陷入琐碎的细节，抓不住重点", mapping: { N: 5 } }, { text: "毫无想象力，只知道陈述干巴巴的流水账", mapping: { N: 10 } } ] },
        { text: "12. 你对于“未来”的看法是？", options:[ { text: "未来太远，把眼前的每一天过好最重要", mapping: { S: 10 } }, { text: "有一定的规划，但基于现有的现实条件", mapping: { S: 5 } }, { text: "脑子里有无数种关于未来的宏大设想", mapping: { N: 5 } }, { text: "未来比现实更重要，我一直活在未来", mapping: { N: 10 } } ] },
        { text: "13. 学习新知识时，你更喜欢哪种方式？", options:[ { text: "给我具体的案例、数据和可操作的步骤", mapping: { S: 10 } }, { text: "能解决实际问题的实用技巧", mapping: { S: 5 } }, { text: "先让我搞懂底层的理论框架", mapping: { N: 5 } }, { text: "探讨那些还没有定论的抽象概念和假设", mapping: { N: 10 } } ] },
        { text: "14. 你的房间布置通常是？", options:[ { text: "非常注重实用性，东西放在触手可及的地方", mapping: { S: 10 } }, { text: "干净整洁，讲究现实的居住体验", mapping: { S: 5 } }, { text: "有些凌乱，但有一种只属于我的“艺术感”", mapping: { N: 5 } }, { text: "完全不在乎现实环境，只要能承载我的灵魂就行", mapping: { N: 10 } } ] },
        { text: "15. 回忆过去时，你脑海中浮现的是？", options:[ { text: "那天穿了什么衣服，吃了什么具体的食物", mapping: { S: 10 } }, { text: "事情发生的前因后果及客观事实", mapping: { S: 5 } }, { text: "当时的整体氛围和内心的情绪起伏", mapping: { N: 5 } }, { text: "那件事对我人生的象征意义", mapping: { N: 10 } } ] },
        { text: "16. 你更钦佩哪种人？", options:[ { text: "脚踏实地，白手起家把生意做大的实干家", mapping: { S: 10 } }, { text: "生活经验丰富，能解决各种麻烦的人", mapping: { S: 5 } }, { text: "能洞察时代趋势的预言家", mapping: { N: 5 } }, { text: "提出颠覆性理论，改变人类认知的思想家", mapping: { N: 10 } } ] },

        // --- T vs F (决策方式：理智与情感) ---
        { text: "17. 当朋友哭着向你诉苦说老板骂了她，你会？", options:[ { text: "分析老板为什么骂她，指出她工作中的漏洞", mapping: { T: 10 } }, { text: "告诉她下一次遇到这种情况该如何应对", mapping: { T: 5 } }, { text: "跟着她一起骂老板，完全站在她这边", mapping: { F: 5 } }, { text: "感受到了她的痛苦，给她一个巨大的拥抱并安慰她", mapping: { F: 10 } } ] },
        { text: "18. 在团队中做一个艰难决定（比如裁员）时，你的依据是？", options:[ { text: "绝对的数据和绩效考核，末位淘汰，毫无私情", mapping: { T: 10 } }, { text: "公司的整体利益和逻辑合理性", mapping: { T: 5 } }, { text: "考虑每个人的家庭状况和感受，尽量温和", mapping: { F: 5 } }, { text: "觉得太残忍了，宁愿自己降薪也不想伤害任何人", mapping: { F: 10 } } ] },
        { text: "19. 你认为一部好的法律应该？", options:[ { text: "绝对客观、冰冷、无情，一视同仁", mapping: { T: 10 } }, { text: "逻辑严密，杜绝任何钻空子的可能", mapping: { T: 5 } }, { text: "法外有情，能够考虑特殊情况下的道德困境", mapping: { F: 5 } }, { text: "充满人道主义关怀，最终目的是为了爱与和平", mapping: { F: 10 } } ] },
        { text: "20. 如果有人对你说“你太冷血了”，你会觉得？", options:[ { text: "这是极大的赞美，说明我足够理智", mapping: { T: 10 } }, { text: "无所谓，我只是陈述事实而已", mapping: { T: 5 } }, { text: "有些受伤，我其实是有关心别人的", mapping: { F: 5 } }, { text: "非常难过，甚至会反思自己是不是真的做错了", mapping: { F: 10 } } ] },
        { text: "21. 辩论时，你最看重的是？", options:[ { text: "彻底击溃对方的逻辑漏洞，赢得胜利", mapping: { T: 10 } }, { text: "论据的真实性和推导过程的严密性", mapping: { T: 5 } }, { text: "双方能否在交流中达成某种共识", mapping: { F: 5 } }, { text: "绝对不能伤了和气，宁愿输掉也不想吵架", mapping: { F: 10 } } ] },
        { text: "22. 你评价一个人是否优秀的标准是？", options:[ { text: "他的能力、成就和产出的实际价值", mapping: { T: 10 } }, { text: "他是否聪明、高效、讲道理", mapping: { T: 5 } }, { text: "他的人品、道德底线和对周围人的态度", mapping: { F: 5 } }, { text: "他是否有一颗善良、温柔、包容的心", mapping: { F: 10 } } ] },
        { text: "23. 遇到网络上的键盘侠喷你，你会？", options:[ { text: "直接抛出铁证和逻辑，把对方怼到哑口无言", mapping: { T: 10 } }, { text: "觉得对方智商太低，冷笑一声拉黑", mapping: { T: 5 } }, { text: "心里会有些憋屈，不知道怎么回击", mapping: { F: 5 } }, { text: "情绪崩溃，陷入内耗，甚至怀疑自己", mapping: { F: 10 } } ] },
        { text: "24. 你心目中完美的爱情是？", options:[ { text: "强强联手，互相提供社会价值的利益共同体", mapping: { T: 10 } }, { text: "三观一致，遇事能讲道理的战友", mapping: { T: 5 } }, { text: "互相提供情绪价值，永远包容对方", mapping: { F: 5 } }, { text: "毫无保留的灵魂共鸣，哪怕飞蛾扑火也在所不惜", mapping: { F: 10 } } ] },

        // --- J vs P (生活方式：判断与感知) ---
        { text: "25. 准备一次长途旅行，你的行李打包方式是？", options:[ { text: "提前一周列好Excel清单，精确到带几双袜子", mapping: { J: 10 } }, { text: "提前一两天把必需品整理好", mapping: { J: 5 } }, { text: "出发前一晚随便塞几件衣服，到了再买", mapping: { P: 5 } }, { text: "甚至连去哪都没定好，直接去机场看心情买票", mapping: { P: 10 } } ] },
        { text: "26. 面对一项截止日期在一个月后的重要任务，你会？", options:[ { text: "第一天就倒推拆解任务，每天按进度执行", mapping: { J: 10 } }, { text: "提前一两周开始做，留出修改时间", mapping: { J: 5 } }, { text: "前二十天都在摸鱼，最后十天开始有紧迫感", mapping: { P: 5 } }, { text: "最后一天晚上创造奇迹，享受肾上腺素飙升的快感", mapping: { P: 10 } } ] },
        { text: "27. 你对“计划被打乱”的反应是？", options:[ { text: "极度暴躁，觉得整天都被毁了", mapping: { J: 10 } }, { text: "感到不悦，试图努力拉回原计划", mapping: { J: 5 } }, { text: "无所谓，那就顺其自然做点别的", mapping: { P: 5 } }, { text: "太棒了！我最讨厌按部就班，意外就是惊喜", mapping: { P: 10 } } ] },
        { text: "28. 你的电脑桌面/手机APP排列情况是？", options:[ { text: "严格按功能分文件夹，强迫症级别的整齐", mapping: { J: 10 } }, { text: "大概分了几类，能找到就行", mapping: { J: 5 } }, { text: "堆满了各种临时文件，全靠搜索功能", mapping: { P: 5 } }, { text: "图标铺满屏幕，甚至连红点提示都懒得点掉", mapping: { P: 10 } } ] },

// 状态记录
let currentStep = 0;
// 记录正负两极的分数
let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
const totalQuestions = config.questions.length;

function init() {
    const container = document.getElementById('question-container');
    config.questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = `question-card ${index === 0 ? 'active' : ''}`;
        div.id = `q-${index}`;
        
        let optionsHtml = q.options.map(opt => `
            <button class="option-btn" onclick="handleSelect(${JSON.stringify(opt.mapping).replace(/"/g, '&quot;')})">
                ${opt.text}
            </button>
        `).join('');

        div.innerHTML = `
            <div class="question-text">${q.text}</div>
            <div class="options-group">${optionsHtml}</div>
        `;
        container.appendChild(div);
    });
    updateProgress();
}

function handleSelect(mapping) {
    // 累加对应维度分值
    for (let dim in mapping) {
        scores[dim] += mapping[dim];
    }

    // 切换题卡
    document.getElementById(`q-${currentStep}`).classList.remove('active');
    currentStep++;

    if (currentStep < totalQuestions) {
        document.getElementById(`q-${currentStep}`).classList.add('active');
        updateProgress();
    } else {
        calculateAndShowResult();
    }
}

function updateProgress() {
    const percent = Math.round((currentStep / totalQuestions) * 100);
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('percent-text').innerText = percent + '%';
    document.getElementById('step-counter').innerText = `审判进度：${currentStep + 1} / ${totalQuestions}`;
}

function calculateAndShowResult() {
    document.getElementById('ui-progress').classList.add('hidden');
    document.getElementById('question-container').classList.add('hidden');
    const resPage = document.getElementById('result-page');
    resPage.style.display = 'block';

    // 1. 判断最终的4个字母
    const typeCode = 
        (scores.E >= scores.I ? 'E' : 'I') +
        (scores.S >= scores.N ? 'S' : 'N') +
        (scores.T >= scores.F ? 'T' : 'F') +
        (scores.J >= scores.P ? 'J' : 'P');

    // 2. 匹配文案
    const resultInfo = config.results.find(r => r.code === typeCode) || config.results[0];
    
    // 处理毒舌UI状态
    if (resultInfo.isIdiot) {
        resPage.classList.add('is-idiot');
    }

    // 渲染基础信息
    document.getElementById('res-code').innerText = resultInfo.code;
    document.getElementById('res-title').innerText = resultInfo.title;
    document.getElementById('res-desc').innerText = resultInfo.desc;

    // 渲染增量深度分析
    if (resultInfo.deep_analysis) {
        document.getElementById('res-root-cause').innerText = resultInfo.deep_analysis.root_cause;
        document.getElementById('res-how-to-change').innerText = resultInfo.deep_analysis.how_to_change;
        document.getElementById('res-fatal-outcome').innerText = resultInfo.deep_analysis.fatal_outcome;
    } else {
        document.getElementById('deep-analysis-area').style.display = 'none';
    }

    // 3. 渲染对立维度横条可视化
    renderVersusBar('能量走向', 'E (外向社交)', scores.E, 'I (内向独处)', scores.I);
    renderVersusBar('信息收集', 'S (关注现实)', scores.S, 'N (发散直觉)', scores.N);
    renderVersusBar('决策方式', 'T (冷酷逻辑)', scores.T, 'F (感性共情)', scores.F);
    renderVersusBar('生活方式', 'J (严谨计划)', scores.J, 'P (随性自由)', scores.P);
}

function renderVersusBar(title, leftLabel, leftScore, rightLabel, rightScore) {
    const total = leftScore + rightScore;
    const leftPercent = total === 0 ? 50 : Math.round((leftScore / total) * 100);
    const rightPercent = 100 - leftPercent;

    const vizContainer = document.getElementById('dimension-viz');
    const row = document.createElement('div');
    row.className = 'vs-row';
    
    row.innerHTML = `
        <div class="vs-labels">
            <span>${leftLabel} ${leftPercent}%</span>
            <span style="color:#64748b;">${title}</span>
            <span>${rightPercent}% ${rightLabel}</span>
        </div>
        <div class="vs-bar-bg">
            <div class="vs-bar-left" style="width: 0%"></div>
            <div class="vs-bar-right" style="width: 100%"></div>
        </div>
    `;
    vizContainer.appendChild(row);

    // 动画延迟
    setTimeout(() => {
        row.querySelector('.vs-bar-left').style.width = leftPercent + '%';
        row.querySelector('.vs-bar-right').style.width = rightPercent + '%';
    }, 100);
}

// 启动测试
init();
</script>
